name: flutter_chat
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  #image picker
  image_picker: ^1.2.1

  #firebase:
  firebase_core: 4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  cupertino_icons: ^1.0.8

  # State Management & Dependency Injection
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^2.6.0
  riverpod: ^2.6.0
  
  # Navigation
  go_router: ^14.3.0
  
  # Network & HTTP
  dio: ^5.7.0
  
  # Local Storage
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path: ^1.9.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Code Generation
  freezed_annotation: ^2.4.4
  
  # Utils
  equatable: ^2.0.7
  connectivity_plus: ^7.0.0
  http: ^1.6.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true

